apiVersion: apps/v1
kind: Deployment
metadata:
  name: visionart-flutter
  namespace: visionart
  labels:
    app: visionart-flutter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visionart-flutter
  template:
    metadata:
      labels:
        app: visionart-flutter
    spec:
      containers:
        - name: flutter-web
          image: ghcr.io/jizel14/visionart-flutter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      imagePullSecrets:
        - name: ghcr-secret
