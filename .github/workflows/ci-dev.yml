name: CI – dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  flutter-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Check for outdated packages
        run: |
          flutter pub outdated --json > flutter-outdated.json
          cat flutter-outdated.json

      - name: Scan Flutter deps against OSV database
        run: |
          python3 << 'EOF'
          import json, urllib.request, yaml

          with open('pubspec.lock', 'r') as f:
              lock = yaml.safe_load(f)

          packages = lock.get('packages', {})
          vulnerabilities = []

          for pkg_name, pkg_info in packages.items():
              version = pkg_info.get('version', '')
              payload = json.dumps({
                  "package": {"name": pkg_name, "ecosystem": "Pub"},
                  "version": version
              }).encode()
              
              req = urllib.request.Request(
                  'https://api.osv.dev/v1/query',
                  data=payload,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req, timeout=5) as resp:
                      result = json.loads(resp.read())
                      if result.get('vulns'):
                          vulnerabilities.append({
                              'package': pkg_name,
                              'version': version,
                              'vulns': result['vulns']
                          })
              except Exception as e:
                  print(f"Could not check {pkg_name}: {e}")

          with open('osv-results.json', 'w') as f:
              json.dump(vulnerabilities, f, indent=2)

          if vulnerabilities:
              print(f"Found {len(vulnerabilities)} packages with known vulnerabilities")
              for v in vulnerabilities:
                  print(f\"- {v['package']}@{v['version']}: {len(v['vulns'])} vuln(s)\")
          else:
              print("No known vulnerabilities found in Flutter dependencies")
          EOF

      - name: Upload Flutter security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-security-scan
          path: |
            flutter-outdated.json
            osv-results.json
          retention-days: 30

  docker-build:
    name: Build & push Docker image (dev)
    runs-on: ubuntu-latest
    needs: flutter-security-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (analyze only – fast)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies & analyze
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          build-args: |
            VISIONCRAFT_API_KEY=${{ secrets.VISIONCRAFT_API_KEY }}
            GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/visionart-flutter:dev
            ghcr.io/${{ github.repository_owner }}/visionart-flutter:dev-${{ github.sha }}
