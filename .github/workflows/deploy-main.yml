name: Deploy – main

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

permissions:
  contents: read
  packages: write

jobs:
  docker-release:
    name: Build & push Docker image (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          build-args: |
            VISIONCRAFT_API_KEY=${{ secrets.VISIONCRAFT_API_KEY }}
            GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/visionart-flutter:latest
            ghcr.io/${{ github.repository_owner }}/visionart-flutter:${{ github.event.inputs.environment }}
            ghcr.io/${{ github.repository_owner }}/visionart-flutter:${{ github.sha }}

      - name: Summary
        run: |
          echo "## Release summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ghcr.io/${{ github.repository_owner }}/visionart-flutter:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
